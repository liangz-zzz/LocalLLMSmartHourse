# Voice Satellite config for remote WebSocket satellites
mode: "ws_server"

audio:
  sample_rate: 16000
  block_size: 512
  input_device: null
  output_device: null
  input_backend: "sounddevice"
  output_backend: "sounddevice"
  pulse_source: "default"
  beep:
    enabled: false
    frequency_hz: 880
    duration_ms: 120
    volume: 0.2

wake:
  phrases: ["你好，米奇"] # informational only in ws_server mode; wake word runs on the device
  vosk:
    model_path: ""
  cooldown_ms: 350
  timeout_ms: 8000

vad:
  threshold: 0.55
  end_silence_ms: 700
  pre_roll_ms: 400
  max_utterance_ms: 20000
  min_utterance_ms: 300

stt:
  whisper_model: "/ABS/PATH/TO/whisper-small.pt"
  language: "zh"
  device: "cpu"

tts:
  piper_bin: "piper"
  model_path: "/ABS/PATH/TO/zh_CN-huayan-medium.onnx"
  config_path: "/ABS/PATH/TO/zh_CN-huayan-medium.onnx.json"
  speaker: null

api_gateway:
  base_url: "http://localhost:4000"
  api_key: ""

# Shared device config. ws satellites must be registered in voice_control.mics[]
# and the mic id must match the satellite hello.deviceId.
device_config_path: "/config/devices.config.json"

agent:
  base_url: "http://localhost:6100"
  timeout_s: 30
  confirm_phrases: ["确认", "执行", "是", "好的", "可以"]
  cancel_phrases: ["取消", "不要", "算了", "停止"]
  exit_phrases: ["再见", "拜拜", "退下", "结束对话", "退出对话"]

runtime:
  session_idle_timeout_ms: 30000
  log_level: "info"

satellite_server:
  host: "0.0.0.0"
  port: 8765
  path: "/ws"
  auth_token: ""
  ping_interval_s: 20
  ping_timeout_s: 20
  max_message_bytes: 524288
